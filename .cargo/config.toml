[alias]
cli = ["run", "--package", "swiitx-cli", "--"]
fmt-check = ["fmt", "--all", "--", "--check"]
lint = ["clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]
test-all = ["test", "--workspace"]
test-differential = ["test", "--package", "swiitx-cpu", "--test", "differential", "--test", "qemu_differential", "--", "--include-ignored", "--nocapture"]
